<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>New Jeans Song Generator</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="index.css" />
</head>

<body>
  <main id="app">
    <h1>
      <span class="letter" style="color: #ff69b4;">N</span><span class="letter" style="color: #ff1493;">e</span><span class="letter" style="color: #ff69b4;">w</span>
      <span class="letter" style="color: #ff1493;"> </span>
      <span class="letter" style="color: #ff69b4;">J</span><span class="letter" style="color: #ff1493;">e</span><span class="letter" style="color: #ff69b4;">a</span><span class="letter" style="color: #ff1493;">n</span><span class="letter" style="color: #ff69b4;">s</span>
      <span class="letter" style="color: #ff1493;"> </span>
      <span class="letter" style="color: #ff69b4;">S</span><span class="letter" style="color: #ff1493;">o</span><span class="letter" style="color: #ff69b4;">n</span><span class="letter" style="color: #ff1493;">g</span>
      <span class="letter" style="color: #ff69b4;"> </span>
      <span class="letter" style="color: #ff1493;">G</span><span class="letter" style="color: #ff69b4;">e</span><span class="letter" style="color: #ff1493;">n</span><span class="letter" style="color: #ff69b4;">e</span><span class="letter" style="color: #ff1493;">r</span><span class="letter" style="color: #ff69b4;">a</span><span class="letter" style="color: #ff1493;">t</span><span class="letter" style="color: #ff69b4;">o</span><span class="letter" style="color: #ff1493;">r</span>
    </h1>
    <div id="coverContainer">
      <img id="danielleSticker" src="graphics/Cd%20Danielle%20Sticker%20(1).gif" alt="Danielle sticker" />
      <img id="trackCover" src="" alt="Album cover" />
    </div>
    <p id="trackName">No track selected</p>
    <div id="status" aria-live="polite" style="margin-top:8px;font-size:13px;opacity:0.9"></div>

    <div id="musicControls">
      <button id="playBtn">▶ Play</button>
      <button id="randomBtn">Randomize Song</button>
    </div>

    <audio id="myAudio" preload="auto"></audio>
  </main>

  <script src="index.js"></script>
</body>

</html>
